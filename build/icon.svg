<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Clipboard/document shape -->
  <rect x="120" y="100" width="272" height="320" rx="24" ry="24" fill="white" opacity="0.95"/>

  <!-- Clipboard top tab -->
  <rect x="192" y="76" width="128" height="48" rx="12" ry="12" fill="white" opacity="0.95"/>
  <rect x="212" y="86" width="88" height="28" rx="8" ry="8" fill="url(#bg)" opacity="0.3"/>

  <!-- Task lines -->
  <!-- Task 1 - completed -->
  <rect x="200" y="175" width="160" height="12" rx="6" fill="#C7D2FE"/>
  <!-- Checkmark circle -->
  <circle cx="172" cy="181" r="18" fill="url(#check)"/>
  <polyline points="162,181 169,188 183,174" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Task 2 - completed -->
  <rect x="200" y="235" width="130" height="12" rx="6" fill="#C7D2FE"/>
  <circle cx="172" cy="241" r="18" fill="url(#check)"/>
  <polyline points="162,241 169,248 183,234" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Task 3 - in progress -->
  <rect x="200" y="295" width="145" height="12" rx="6" fill="#E0E7FF"/>
  <circle cx="172" cy="301" r="18" fill="none" stroke="#4F46E5" stroke-width="3.5"/>

  <!-- Task 4 - pending -->
  <rect x="200" y="355" width="120" height="12" rx="6" fill="#E0E7FF"/>
  <circle cx="172" cy="361" r="18" fill="none" stroke="#4F46E5" stroke-width="3.5"/>
</svg>